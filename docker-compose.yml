version: '3.8'

services:
  # Backend API Service
  api:
    build:
      context: ./ShopSphere.API
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80;https://+:443
      - ConnectionStrings__DefaultConnection=Server=db;Database=ShopSphereDb;User=sa;Password=YourStrong!Password;
    depends_on:
      - db
    networks:
      - shopsphere-network

  # Frontend Service
  web:
    build:
      context: ./ShopSphereUI
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - shopsphere-network

  # Database Service
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Password
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - shopsphere-network

networks:
  shopsphere-network:
    driver: bridge

volumes:
  sqldata: 